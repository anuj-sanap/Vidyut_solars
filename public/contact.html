<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Vidyut Solar and Electricals Nashik</title>
    <meta name="description" content="Contact Vidyut Solar and Electricals for solar panel installation in Nashik. Get a free quote and site visit." />
    <meta name="keywords" content="Solar panel installation in Nashik, Best solar service in Nashik, Solar rooftop Nashik" />
    <link rel="canonical" href="https://vidyutsolar.in/contact.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Contact Vidyut Solar and Electricals | Nashik" />
    <meta property="og:description" content="Book your free site visit and get a custom rooftop solar quote for your property in Nashik." />
    <meta property="og:url" content="https://vidyutsolar.in/contact.html" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1509391366360-2e959784a276?auto=format&fit=crop&w=1800&q=80" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Contact Vidyut Solar and Electricals | Nashik" />
    <meta name="twitter:description" content="Call or WhatsApp to schedule a free site visit and receive your personalized solar estimate." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-page="contact" class="bg-slate-50 text-slate-800">
    <div id="navbar-root"></div>

    <main class="mx-auto max-w-7xl px-4 py-14 md:px-6">
      <h1 class="text-3xl font-extrabold text-slate-900 md:text-4xl">Contact Us</h1>
      <p class="mt-3 max-w-3xl text-sm leading-relaxed text-slate-700">Get a free site visit and custom solar estimate for your property. Our team usually responds within 30 minutes during business hours.</p>

      <section class="mt-8 grid gap-8 md:grid-cols-2">
        <div class="rounded-2xl bg-white p-5 shadow-sm">
          <h2 class="text-xl font-bold text-slate-900">Lead Capture Form</h2>
          <form class="lead-form mt-4">
            <input type="hidden" name="source" value="contact-page" />
            <div class="grid gap-4">
              <label class="text-sm font-medium text-slate-700" for="contact-name">Full Name</label>
              <input id="contact-name" name="name" required autocomplete="name" placeholder="Name" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
              <label class="text-sm font-medium text-slate-700" for="contact-phone">Phone Number</label>
              <input id="contact-phone" name="phone" type="tel" inputmode="numeric" pattern="^[0-9]{10}$" maxlength="10" required placeholder="10-digit phone number" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
              <label class="text-sm font-medium text-slate-700" for="contact-location">Location</label>
              <input id="contact-location" name="location" required placeholder="Location (Nashik / nearby area)" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
              <label class="text-sm font-medium text-slate-700" for="contact-plot">Plot Size (sq ft)</label>
              <input id="contact-plot" name="plotSize" type="number" min="100" required placeholder="Plot Size (important for estimation)" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
              <label class="text-sm font-medium text-slate-700" for="contact-bill">Monthly Electricity Bill (optional)</label>
              <input id="contact-bill" name="electricityBill" type="number" min="0" placeholder="Electricity Bill (optional)" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
              <button type="submit" class="rounded-md bg-emerald-600 px-4 py-3 text-sm font-bold text-white hover:bg-emerald-700">Get Free Quote</button>
              <p class="form-status text-sm"></p>
            </div>
          </form>
        </div>

        <div class="space-y-5">
          <div class="rounded-2xl bg-white p-5 shadow-sm">
            <h3 class="font-bold text-slate-900">Direct Contact</h3>
            <p class="mt-2 text-sm text-slate-600">Talk directly with our Nashik solar team for quick guidance.</p>
            <div class="mt-3 flex flex-col gap-3 text-sm">
              <a href="tel:+917558200928" class="rounded-md bg-yellow-400 px-4 py-3 font-semibold text-slate-900">Call Now</a>
              <a href="https://wa.me/917558200928?text=Hi%20Vidyut%20Solar%2C%20I%20want%20a%20solar%20installation%20quote%20in%20Nashik" target="_blank" rel="noopener" class="rounded-md bg-emerald-500 px-4 py-3 font-semibold text-white">WhatsApp</a>
            </div>
          </div>
          <div class="rounded-2xl bg-white p-4 shadow-sm">
            <h3 class="font-bold text-slate-900">Service Area Map</h3>
            <iframe
              title="Nashik service area map"
              class="mt-4 h-72 w-full rounded-lg"
              loading="lazy"
              src="https://www.google.com/maps?q=Nashik%20Maharashtra&output=embed"
            ></iframe>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-root"></div>
    <div id="whatsapp-root"></div>
    <script src="/js/main.js"></script>
    <script src="/js/form.js"></script>
  </body>
</html>
